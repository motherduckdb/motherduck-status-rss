name: Update RSS Feed

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        run: python generate_feed.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload feed to S3
        run: aws s3 cp feed.xml s3://status-rss.md-playground.com/feed.xml --content-type application/rss+xml

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ENHBL8P96A9S8 --paths "/feed.xml"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --cached --quiet || git commit -m "chore: update feed.xml [skip ci]" && git push
